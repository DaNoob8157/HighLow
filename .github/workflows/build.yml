name: Build Multi-Platform App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java-version: [ '25' ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'

      - name: Build application (Linux/Windows)
        if: runner.os != 'macOS'
        run: |
          javac -d out/production/HighLow src/MainCracked.java
          jar cfe out/HighLow.jar MainCracked -C out/production/HighLow .

      - name: Build application with icon (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p out/production/HighLow
          javac -d out/production/HighLow src/MainCracked.java
          jar cfe out/HighLow.jar MainCracked -C out/production/HighLow .
          cp "App Icon/Appicon.icns" out/HighLow.icns

      - name: Create macOS app bundle
        if: runner.os == 'macOS'
        run: |
          mkdir -p HighLow.app/Contents/MacOS
          mkdir -p HighLow.app/Contents/Resources
          
          # Copy JAR
          cp out/HighLow.jar HighLow.app/Contents/MacOS/
          
          # Copy ICNS icon
          cp "App Icon/Appicon.icns" HighLow.app/Contents/Resources/HighLow.icns
          
          # Create Info.plist
          cat > HighLow.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>HighLow</string>
              <key>CFBundleIconFile</key>
              <string>HighLow</string>
              <key>CFBundleIdentifier</key>
              <string>com.highlow.app</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>HighLow</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>NSMainNibFile</key>
              <string>MainMenu</string>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF
          
          # Create launcher script
          cat > HighLow.app/Contents/MacOS/HighLow << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
          java -jar "$DIR/HighLow.jar"
          EOF
          
          chmod +x HighLow.app/Contents/MacOS/HighLow

      - name: Create Windows executable wrapper (Windows)
        if: runner.os == 'Windows'
        run: |
          @echo off
          setlocal
          set DIR=%~dp0
          java -jar "%DIR%HighLow.jar"
          > HighLow.bat
          
          PowerShell -Command "Copy-Item out\HighLow.jar -Destination ."

      - name: Create Linux launcher script (Linux)
        if: runner.os == 'Linux'
        run: |
          cat > HighLow.sh << 'EOF'
          #!/bin/bash
          DIR="$( cd "$( dirname "${BASH_SOURCE[0]}" )" && pwd )"
          java -jar "$DIR/HighLow.jar"
          EOF
          chmod +x HighLow.sh
          cp out/HighLow.jar .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HighLow-${{ runner.os }}
          path: |
            HighLow.app/
            HighLow.jar
            HighLow.bat
            HighLow.sh
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            HighLow.app/
            HighLow.jar
            HighLow.bat
            HighLow.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}